name: Update Crashmeter

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC, Senin-Jumat (setelah US market close)
  workflow_dispatch:          # tombol "Run workflow" manual

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Hitung skor
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python crashmeter.py

      - name: Commit data.json
        run: |
          git config user.name  "crashmeter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "update skor $(date -u +%F)"
          git push
